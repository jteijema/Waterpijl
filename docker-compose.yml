services:
  waterpijl:
    image: ghcr.io/jteijema/waterpijl:latest
    container_name: waterpijl
    restart: always
    environment:
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_TO=${EMAIL_TO}
      - ALERT_LEVEL=200
      - LOCATION_CODE=matroos.AF_234.00
      - FORECAST_DAYS=5
      - CRON_SCHEDULE=0 8,20 * * *
      - DATA_DIR=/data
      - WEBAPP_PORT=7261
    ports:
      - "7261:7261"
    volumes:
      - waterpijl_data:/data
      - /etc/localtime:/etc/localtime:ro

volumes:
  waterpijl_data:
